<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#050505"/>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#152085" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <circle cx="140" cy="110" r="90" fill="#2B3BFF" opacity="0.18" filter="url(#glow)"/>
  <circle cx="1060" cy="620" r="130" fill="#FF69B4" opacity="0.13" filter="url(#glow)"/>

  <text x="80" y="86" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="34" font-weight="800">App 01. 운동 타이머</text>
  <text x="80" y="126" fill="#B8BAFF" font-family="Arial, sans-serif" font-size="21">운동 시간과 쉬는 시간을 반복하는 레트로 인터벌 타이머</text>

  <g transform="translate(300 150)">
    <rect x="0" y="0" width="600" height="96" fill="#000000" stroke="#2B3BFF" stroke-width="6" filter="url(#glow)"/>
    <text x="300" y="60" fill="#FF69B4" text-anchor="middle" font-family="Courier New, monospace" font-size="34" font-weight="800">PLAN GAME</text>

    <rect x="0" y="124" width="600" height="340" fill="#000000" stroke="#2B3BFF" stroke-width="6" filter="url(#glow)"/>
    <text x="300" y="222" fill="#FF69B4" text-anchor="middle" font-family="Courier New, monospace" font-size="78" font-weight="900">01:00:00</text>
    <text x="300" y="270" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">운동 시간 · 쉬는 시간 · 반복 세트</text>

    <g transform="translate(58 304)">
      <rect x="0" y="0" width="222" height="58" rx="4" fill="#000000" stroke="#FF69B4" stroke-width="3"/>
      <text x="111" y="37" fill="#FF69B4" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800">운동 시간</text>
      <rect x="262" y="0" width="222" height="58" rx="4" fill="#000000" stroke="#2B3BFF" stroke-width="3"/>
      <text x="373" y="37" fill="#FFFFFF" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800">쉬는 시간</text>
    </g>

    <g transform="translate(54 390)" fill="#000000" font-family="Arial, sans-serif" font-size="20" font-weight="800">
      <rect x="0" y="0" width="110" height="48" stroke="#2B3BFF" stroke-width="3"/>
      <text x="55" y="31" fill="#FF69B4" text-anchor="middle">+10초</text>
      <rect x="126" y="0" width="110" height="48" stroke="#2B3BFF" stroke-width="3"/>
      <text x="181" y="31" fill="#FF69B4" text-anchor="middle">+1분</text>
      <rect x="252" y="0" width="110" height="48" stroke="#2B3BFF" stroke-width="3"/>
      <text x="307" y="31" fill="#FF69B4" text-anchor="middle">+10분</text>
      <rect x="378" y="0" width="110" height="48" stroke="#2B3BFF" stroke-width="3"/>
      <text x="433" y="31" fill="#FF69B4" text-anchor="middle">+1시간</text>
    </g>

    <rect x="100" y="498" width="400" height="76" fill="#FF69B4" stroke="#FFFFFF" stroke-width="5" filter="url(#glow)"/>
    <text x="300" y="548" fill="#FFFFFF" text-anchor="middle" font-family="Courier New, monospace" font-size="34" font-weight="900">START!</text>
  </g>

  <g transform="translate(82 610)">
    <rect width="240" height="74" rx="14" fill="#101025" stroke="#2B3BFF" stroke-width="2"/>
    <text x="24" y="31" fill="#FFFF00" font-family="Arial, sans-serif" font-size="18" font-weight="800">소리 모드</text>
    <text x="24" y="56" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">마지막 5초만 / 매초마다</text>
  </g>

  <g transform="translate(878 610)">
    <rect width="240" height="74" rx="14" fill="#101025" stroke="#2B3BFF" stroke-width="2"/>
    <text x="24" y="31" fill="#00FFCC" font-family="Arial, sans-serif" font-size="18" font-weight="800">모바일 대응</text>
    <text x="24" y="56" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">소리 fallback · 화면 유지</text>
  </g>
</svg>
